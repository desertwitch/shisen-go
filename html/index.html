<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    background: #2A2D35;
    overflow: hidden;
    font-family: sans-serif;
  }
  #hint-top, #hint-bottom {
    color: #6E6E6E;
    font-size: 12px;
    text-align: center;
    padding: 4px;
  }
  #hint-bottom { color: #585858; font-size: 11px; }
  iframe {
    border: none;
    display: block;
    flex: 1;
    width: 100%;
  }
  @media (max-height: 700px) {
    #hint-top, #hint-bottom { display: none; }
    iframe { height: 100vh; }
  }
  @media (min-height: 701px) {
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    iframe { width: 960px; height: 650px; }
  }
</style>
</head>
<body>
  <p id="hint-top">Connect tiles of the same symbol with a path of up to 3 line segments (2 bends)</p>
  <iframe id="game" src="main.html" allow="autoplay" scrolling="no"></iframe>
  <p id="hint-bottom">Click into the playing area first if your keyboard input is not registered</p>
  <script>
    const iframe = document.getElementById('game');
    iframe.addEventListener('load', () => iframe.contentWindow.focus());
    document.addEventListener('click', () => iframe.contentWindow.focus());
  </script>
</body>
</html>
