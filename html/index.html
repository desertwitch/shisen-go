<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    background: #2A2D35;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: sans-serif;
  }
  #hint-top {
    color: #6E6E6E;
    font-size: 12px;
    margin-bottom: 8px;
  }
  iframe {
    border: none;
  }
  #hint-bottom {
    color: #585858;
    font-size: 11px;
    margin-top: 8px;
  }
</style>
</head>
<body>
  <p id="hint-top">Connect tiles of the same symbol with a path of up to 3 line segments (2 bends)</p>
  <iframe id="game" src="main.html" width="960" height="650" allow="autoplay" scrolling="no"></iframe>
  <p id="hint-bottom">Click into the playing area first if your keyboard input is not registered</p>
  <script>
    const iframe = document.getElementById('game');
    iframe.addEventListener('load', () => iframe.contentWindow.focus());
    document.addEventListener('click', () => iframe.contentWindow.focus());
  </script>
</body>
</html>
