<!DOCTYPE html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  canvas { touch-action: none; background: #2A2D35; }
</style>
<script src="wasm_exec.js"></script>
<script>
const go = new Go();
const v = "__VERSION__"; 
WebAssembly.instantiateStreaming(fetch("shisen-go.wasm?v=" + v), go.importObject).then(result => {
    go.run(result.instance);
});
</script>
